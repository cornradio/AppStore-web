<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store 描述编辑器</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/editor.css">
    <link rel="icon" href="https://www.emojiall.com/en/header-svg/%F0%9F%93%9D.svg">
</head>

<body>
    <header class="header">
        <div class="container header-layout">
            <div class="brand">
                <h1>📝 描述编辑器</h1>
            </div>
            <div class="header-controls">
                <a href="index.html" class="back-link">返回商店</a>
            </div>
        </div>
    </header>

    <main class="container editor-main">
        <div class="editor-grid editor-two-col">
            <!-- 左侧：Markdown 编辑 -->
            <div class="editor-column">
                <div class="column-header">
                    <h3>Markdown 编辑</h3>
                    <div class="header-actions-group">
                        <input type="text" id="fileNameInput" placeholder="文件名 (如 win-translator)" class="filename-input">
                        <button id="saveMdBtn" class="action-btn">保存 .md 文件</button>
                    </div>
                </div>
                <div class="syntax-hints">
                    <span>### 标题</span>
                    <span>**粗体**</span>
                    <span>*斜体*</span>
                    <span>`代码`</span>
                    <span>```代码块```</span>
                    <span>- 列表</span>
                    <span>  - 子列表</span>
                    <span>[链接](url)</span>
                    <span>![图片](src =300)</span>
                </div>
                <textarea id="markdownInput" placeholder="在这里写 Markdown...

### 功能特点

**WinTranslator** 是一款轻量级桌面划词 AI 助手。

- **极简操作**：选中文字，按 `Alt + T` 即刻弹窗
- **高自定义**：支持接入 DeepSeek 等大模型

![截图](img/screenshot.jpg)

[官网](https://example.com)
"></textarea>
            </div>

            <!-- 右侧：预览 -->
            <div class="editor-column preview-column">
                <div class="column-header">
                    <h3>预览效果</h3>
                </div>
                <div id="previewArea" class="preview-container">
                    <p style="color: #888; text-align: center; margin-top: 50px;">在左侧输入 Markdown，这里实时预览</p>
                </div>
            </div>
        </div>

        <!-- JSON 配置提示 -->
        <div class="config-hint" id="configHint">
            <h4>在 apps.json 中这样引用：</h4>
            <pre id="configSnippet">{
  "name": "你的应用名",
  "description_file": "data/descriptions/<span id="snippetFilename">文件名.md</span>"
}</pre>
        </div>
    </main>

    <script src="js/converter.js"></script>
    <script src="js/editor.js"></script>
</body>

</html>
