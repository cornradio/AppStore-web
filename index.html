    <!-- 添加设置弹窗 -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <h2>设置</h2>
            <div class="settings-form">
                <label for="jsonPath">JSON 数据源路径:</label>
                <input type="text" id="jsonPath" placeholder="输入 JSON 文件路径">
                <div class="settings-buttons">
                    <button class="save-button">保存</button>
                    <button class="cancel-button">取消</button>
                </div>
                <p style="color: #999;">默认商店路径 data/apps.json</p>
                <p style="color: #999;">实用工具路径 data/apps2.json</p>
                <p style="color: #999;">参考示例 data/apps.example.json</p>
            </div>
        </div>
    </div>

    <script src="js/search.js"></script>
    <script src="js/converter.js"></script>
    <script src="js/main.js"></script>
